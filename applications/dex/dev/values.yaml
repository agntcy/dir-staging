# Ref: https://github.com/dexidp/helm-charts/tree/master/charts/dex
#
# Dex OIDC token broker example for dev
# Dex acts as a stateless token broker: no user database, no user management.
# It exchanges GitHub OAuth identity for signed OIDC JWTs that Envoy validates.
#
# ============================================================================
# DEPLOYMENT NOTES
# ============================================================================
# • Set config.issuer to the public URL where Dex will be reachable.
# • Create a GitHub OAuth App and supply credentials via a Kubernetes Secret
#   (referenced below as dex-github-credentials).
#   For production, use ExternalSecrets or a secrets manager.
# ============================================================================

replicaCount: 1

config:
  # Public URL where Dex is exposed (must match ingress/DNS)
  # Keep this value aligned with:
  # - connectors[].config.redirectURI (same hostname + /callback)
  # - applications/dir/dev/values.yaml -> apiserver.envoy-authz.envoy.oidc.dex.issuer
  # - applications/dir/dev/values.yaml -> apiserver.envoy-authz.authServer.oidc.issuers[].provider
  issuer: https://dex.example.com

  storage:
    type: kubernetes
    config:
      inCluster: true

  connectors:
    - type: github
      id: github
      name: GitHub
      config:
        clientID: $GITHUB_CLIENT_ID
        clientSecret: $GITHUB_CLIENT_SECRET
        # This callback must use the same public Dex hostname as config.issuer.
        redirectURI: https://dex.example.com/callback
        useLoginAsID: true

  staticClients:
    - id: dirctl
      name: Directory CLI
      # Public client for browser/device login flows from developer machines.
      # The CLI is expected to obtain a Dex token first, then call the Directory
      # OIDC gateway exposed by applications/dir/dev/values.yaml.
      public: true
      redirectURIs:
        # Local browser callback used by interactive login flows.
        - http://localhost:8484/callback
        # Device flow callback expected by Dex when oauth2.deviceRequests is enabled.
        - /device/callback

  expiry:
    idTokens: "1h"
    signingKeys: "6h"

  oauth2:
    skipApprovalScreen: true
    deviceRequests:
      # Recommended for remote dirctl usage because the CLI may run outside the cluster.
      enabled: true

# GitHub OAuth credentials injected from a Kubernetes Secret.
# In this repo the matching secret manifest is configured in:
# - applications/dex-credentials/dev/values.yaml
envVars:
  - name: GITHUB_CLIENT_ID
    valueFrom:
      secretKeyRef:
        name: dex-github-credentials
        key: clientID
  - name: GITHUB_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: dex-github-credentials
        key: clientSecret
