# Ref: https://github.com/agntcy/dir/blob/main/install/charts/dir/values.yaml

apiserver:
  log_level: DEBUG

  image:
    repository: ghcr.io/agntcy/dir-apiserver
    tag: v1.2.0
    pullPolicy: IfNotPresent
    pullSecrets: []
  
  # Resources: use chart default (empty) for Kind - allows flexible scheduling
  # Chart recommends not specifying resources for dev/minikube environments
  resources: {}

  # ============================================================================
  # OPTIONAL PRODUCTION FEATURES (Not configured in this example)
  # ============================================================================
  # This example uses simple configuration for local Kind/testing.
  # For production deployment, consider enabling:
  #
  # • Persistent Storage (PVCs) - Data persists across restarts
  # • ExternalSecrets - Secure credential management with Vault
  # • Ingress & TLS - External access with certificates
  # • Higher resource limits - Based on expected production load
  #
  # See documentation: https://github.com/agntcy/dir/tree/main/docs/deployment
  # ============================================================================
  
  # Expose the DIR API via NodePort for external access
  service:
    type: NodePort

  # Prometheus metrics (disabled for minimal example; no Prometheus observability)
  metrics:
    enabled: false

  # Expose the P2P API via NodePort for external access
  routingService:
    type: NodePort
    nodePort: 30555
    # Preserve source IPs for P2P (recommended)
    externalTrafficPolicy: Local

  # SPIRE configuration
  # Chart defaults to SPIFFE CSI driver (spire.useCSIDriver: true)
  # Ensures synchronous workload registration and eliminates authentication delays
  spire:
    enabled: true
    className: dir-spire
    trustDomain: example.org
    useCSIDriver: true  # Use SPIFFE CSI driver for reliable identity injection (default, explicit for clarity)
    
    # SPIRE controller className for ClusterSPIFFEID matching
    # REQUIRED: The className field is mandatory for ClusterSPIFFEID resources.
    # The SPIRE controller manager uses className to match ClusterSPIFFEID resources
    # with the appropriate SPIRE installation. Without this field, the controller
    # will ignore the ClusterSPIFFEID and no workload registration will occur.
    # See: https://github.com/spiffe/spire-controller-manager/blob/main/docs/clusterspiffeid-crd.md

  # API server configuration
  config:
    listen_address: "0.0.0.0:8888"

    # OASF validation configuration (REFACTORED in v0.5.6)
    # Nested structure for better organization
    oasf_api_validation:
      disable: true            # Use embedded schemas (faster, no network dependency)
      # schema_url: Not used when disabled
      # strict_mode: Not used when disabled (embedded validation uses fixed behavior)

    # Authentication settings (handles identity verification)
    # Supports both X.509 (X.509-SVID) and JWT (JWT-SVID) authentication
    authn:
      # Enable authentication
      enabled: true
      # Authentication mode: "x509" or "jwt"
      # - x509: Uses X.509-SVID from mutual TLS peer certificates
      # - jwt: Uses JWT-SVID from Authorization header
      mode: "x509"
      # SPIFFE Workload API socket path (injected by SPIRE agent)
      socket_path: "unix:///run/spire/agent-sockets/api.sock"
      # Expected audiences for JWT validation (only used in JWT mode)
      audiences:
        - "spiffe://example.org/spire/server"

    # Authorization settings (handles access control policies)
    # Requires authentication to be enabled first
    # Uses Casbin policy engine for flexible, policy-driven authorization
    authz:
      enabled: true
      # Path to the authorization policy file
      enforcer_policy_file_path: "/etc/agntcy/dir/authz_policies.csv"

    # Rate limiting configuration
    # Protects against abuse and resource exhaustion
    ratelimit:
      enabled: false  # Minimal example; no need for rate limiting
      global_rps: 50         # Requests per second (modest for Kind)
      global_burst: 100      # Burst capacity
      per_client_rps: 100    # Per authenticated client
      per_client_burst: 200
    
    # Store settings for the storage backend.
    store:
      # Storage provider to use.
      provider: "oci"

      # OCI-backed store
      oci:
        # Path to a local directory that will be to hold data instead of remote.
        # If this is set to non-empty value, only local store will be used.
        # local_dir: ""

        # Cache directory to use for metadata.
        # cache_dir: ""

        # Registry address to connect to
        # For Kind: local Zot service in cluster
        # For production: external address shared via RequestRegistryCredentials RPC
        registry_address: "dir-dir-dev-argoapp-zot.dir-dev-dir.svc.cluster.local:5000"
        
        # All data will be stored under this repo.
        # Objects are pushed as tags, manifests, and blobs.
        # repository_name: ""

        # Auth credentials (inline for Kind; use ExternalSecret for production)
        auth_config:
          insecure: "true"
          username: "admin"
          password: "admin"

    # Routing settings for the peer-to-peer network.
    routing:
      # Address to use for routing
      listen_address: "/ip4/0.0.0.0/tcp/5555"

      # Path to private key file for peer ID
      # Provides stable peer identity across pod restarts
      # TODO: generate and mount via secret for Kind
      # key_path: /etc/routing/node.privkey

      # Path to the routing datastore
      datastore_dir: /etc/routing/datastore

      # Address of the Directory API server for sync operations
      # For Kind: internal cluster address
      directory_api_address: dir-dir-dev-argoapp-apiserver.dir-dev-dir.svc.cluster.local:8888

      # Nodes to use for bootstrapping of the DHT
      # For single-node Kind: can be left empty
      # bootstrap_peers:
      #   - /ip4/1.1.1.1/tcp/1
      #   - /ip4/1.1.1.1/tcp/2

      # GossipSub configuration for efficient label announcements
      # When enabled, labels are propagated via GossipSub mesh to ALL subscribed peers
      # When disabled, falls back to DHT+Pull mechanism (higher bandwidth, limited reach)
      gossipsub:
        enabled: false  # Single-node Kind; no peers to gossip with

    # Sync configuration
    # Only used for RequestRegistryCredentials RPC (provides registry auth to remote nodes)
    # For Kind: inline credentials; production uses reconciler's regsync + ExternalSecret
    sync:
      # Authentication configuration for sync operations
      auth_config:
        username: "user"
        password: "user"

    # Publication configuration
    publication:
      # How frequently the scheduler checks for pending publications
      scheduler_interval: "1h"
      worker_count: 0  # Minimal example; no P2P peers to publish to
      
      # Timeout for individual publication operations
      worker_timeout: "30m"

    # Database configuration (PostgreSQL)
    # Connection settings for the apiserver database
    # Credentials from postgresql.auth (inline for Kind; use ExternalSecret for production)
    database:
      # Database type (only postgres is supported)
      type: "postgres"
      postgres:
        # PostgreSQL host address - leave empty; chart auto-derives from postgresql subchart
        host: ""
        port: 5432
        database: "dir"
        ssl_mode: "disable"

  # Casbin authorization policies (top-level, not in config)
  # Format: p,<subject>,<object>
  # - subject: SPIFFE trust domain (e.g., example.org) or * for any
  # - object: gRPC method path or * for all methods
  authz_policies_csv: |
    p,example.org,*
    p,*,/agntcy.dir.store.v1.StoreService/Pull
    p,*,/agntcy.dir.store.v1.StoreService/PullReferrer
    p,*,/agntcy.dir.store.v1.StoreService/Lookup
    p,*,/agntcy.dir.store.v1.SyncService/RequestRegistryCredentials

  # Reconciler configuration
  reconciler:
    image:
      tag: v1.2.0

  # ============================================================================
  # OPTIONAL OIDC AUTHENTICATION ADD-ON (Envoy + ext-authz)
  # ============================================================================
  # This add-on solves the common "remote dirctl" problem for users running the
  # CLI or SDKs outside the cluster. Instead of exposing the Directory API
  # directly, you place Envoy in front of it:
  #
  #   remote client -> OIDC provider -> Envoy jwt_authn -> ext-authz -> Directory
  #
  # Use this add-on when you want:
  # - browser or CLI login through Dex-issued OIDC tokens
  # - GitHub Actions access through GitHub OIDC tokens
  # - claim-based role mapping before the request reaches Directory
  #
  # Keep this section disabled by default. The existing x509/SPIFFE-based
  # apiserver authentication still applies to in-cluster and workload traffic.
  # When enabled, Envoy validates user or workflow JWTs, and ext-authz maps
  # claims to roles and allowed gRPC methods.
  # ============================================================================
  envoyAuthz:
    enabled: false

  envoy-authz:
    envoy:
      # Run more than one Envoy replica for public or shared environments.
      replicaCount: 2

      # Requests first terminate at Envoy, then Envoy forwards only authorized
      # gRPC calls to the internal Directory apiserver Service.
      # This must stay on the internal Kubernetes Service DNS name, not the
      # public gateway hostname exposed through ingress.
      backend:
        address: "dir-dir-dev-argoapp-apiserver.dir-dev-dir.svc.cluster.local"
        port: 8888
        timeout: 30s

      # JWT validation at the edge. Enable only the providers you actually use.
      oidc:
        dex:
          # Enable this when you deploy Dex for human or device-flow logins.
          # Keep these values aligned with applications/dex/dev/values.yaml.
          enabled: true
          # Must match dex.config.issuer.
          issuer: "https://dex.example.com"
          # Dex publishes signing keys at /keys.
          jwksUri: "https://dex.example.com/keys"
          # Override only if the TLS SNI/Host header must differ from issuer.
          jwksHost: "dex.example.com"
        github:
          # Enable this only when GitHub Actions or other GitHub OIDC-based
          # automation should call Directory directly.
          enabled: true
          issuer: "https://token.actions.githubusercontent.com"
          jwksUri: "https://token.actions.githubusercontent.com/.well-known/jwks"
          jwksHost: "token.actions.githubusercontent.com"
          # Optionally require one or more audience values on workflow tokens.
          # audiences:
          #   - "dir"
        # JWKS fetch timeout and cache duration for the Envoy jwt_authn filter.
        jwksTimeout: 5s
        jwksCacheSeconds: 300

      spiffe:
        # Keep SPIFFE enabled so Envoy authenticates to Directory over mTLS.
        enabled: true
        trustDomain: example.org
        className: dir-spire

      # Optional image override if you need to pin a custom Envoy build.
      # image:
      #   repository: envoyproxy/envoy
      #   tag: distroless-v1.37-latest
      #   pullPolicy: IfNotPresent

      # Optional service or resource tuning for public ingress deployments.
      # service:
      #   type: ClusterIP
      #   port: 8080
      #   annotations: {}
      # resources:
      #   requests:
      #     cpu: 100m
      #     memory: 128Mi
      #   limits:
      #     cpu: 500m
      #     memory: 512Mi

    authServer:
      # ext-authz is a separate gRPC service that makes the allow/deny decision
      # after Envoy validates the JWT and forwards selected claims.
      replicaCount: 2

      # Keep the authz image on the same release line as Directory unless you
      # are intentionally testing a custom authz build.
      image:
        repository: ghcr.io/agntcy/envoy-authz
        tag: v1.2.0
        pullPolicy: IfNotPresent

      # Optional resource tuning for heavier public traffic.
      # resources:
      #   requests:
      #     cpu: 100m
      #     memory: 128Mi
      #   limits:
      #     cpu: 500m
      #     memory: 512Mi

      oidc:
        claims:
          # "sub" is the safest generic default. Switch to
          # "preferred_username" if your IdP guarantees that claim.
          userID: "sub"
          emailPath: "email"

        # Map known issuers to principal types. This is how ext-authz decides
        # whether a token represents a human user, service client, or GitHub
        # workflow principal.
        # Example:
        # issuers:
        #   - provider: "https://dex.example.com"
        #     principalType: "user"
        #   - provider: "https://token.actions.githubusercontent.com"
        #     principalType: "github"
        # Add one entry per issuer you expect Envoy to accept above.
        issuers: []

        principalType:
          # auto   -> infer from claims
          # user   -> treat tokens as human users
          # client -> treat tokens as service principals
          # github -> treat tokens as GitHub workflow principals
          mode: "auto"
          machineIdentityClaim: "client_id"
          machineSubPattern: ""

        # Explicitly block individual principals if needed.
        userDenyList: []

        # Requests to these paths bypass role checks in ext-authz.
        publicPaths:
          - "/healthz"
          - "/grpc.reflection"

        # Roles map OIDC-derived principals to allowed gRPC methods.
        # Principal examples:
        # - user:https://dex.example.com:alice
        # - client:https://dex.example.com:dirctl-service
        # - ghwf:repo:agntcy/dir:workflow:import-records.yaml:ref:refs/heads/main
        # - ghwf:repo:your-org/your-repo:workflow:import-records.yaml:ref:refs/heads/main
        # - ghwf:repo:your-org/your-repo:workflow:deploy.yml:ref:refs/tags/v1.2.0
        #
        # Workflow principal format:
        # ghwf:repo:<owner>/<repo>:workflow:<workflow-file>:ref:<git-ref>
        #
        # Common git-ref examples:
        # - refs/heads/main
        # - refs/heads/release/*
        # - refs/tags/v1.2.0
        roles:
          admin:
            allowedMethods: ["*"]
            users: []
            clients: []
            githubWorkflows: []

          viewer:
            allowedMethods:
              - "/agntcy.dir.store.v1.StoreService/Pull"
              - "/agntcy.dir.store.v1.StoreService/Lookup"
              - "/agntcy.dir.store.v1.StoreService/PullReferrer"
              - "/agntcy.dir.search.v1.SearchService/SearchCIDs"
              - "/agntcy.dir.search.v1.SearchService/SearchRecords"
            users: []
            clients: []
            githubWorkflows: []

          ci-writer:
            allowedMethods:
              - "/agntcy.dir.store.v1.StoreService/Push"
              - "/agntcy.dir.store.v1.StoreService/PushReferrer"
              - "/agntcy.dir.store.v1.StoreService/Pull"
              - "/agntcy.dir.search.v1.SearchService/SearchCIDs"
              - "/agntcy.dir.search.v1.SearchService/SearchRecords"
            users: []
            clients: []
            # Replace [] with explicit workflow principals when CI should write to
            # the Directory through GitHub OIDC tokens.
            githubWorkflows:
              # Example: allow the main branch import workflow in a single repo.
              # - "ghwf:repo:your-org/your-repo:workflow:import-records.yaml:ref:refs/heads/main"
              #
              # Example: allow any branch for a dedicated OIDC test workflow.
              # - "ghwf:repo:your-org/your-repo:workflow:oidc-test.yml:ref:refs/heads/*"
              #
              # Example: allow release tags for a deployment workflow.
              # - "ghwf:repo:your-org/your-repo:workflow:deploy.yml:ref:refs/tags/v*"

    ingress:
      # Expose Envoy through a gRPC-capable ingress only when you want remote
      # users or automation to reach Directory from outside the cluster.
      # This is the hostname that remote dirctl or SDK clients will target.
      enabled: false
      className: nginx
      host: "" # e.g. gateway.example.com
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/hostname: ""
        nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
        nginx.ingress.kubernetes.io/grpc-backend: "true"
        # Optional rate limiting for public exposure.
        # nginx.ingress.kubernetes.io/limit-rps: "100"
        # nginx.ingress.kubernetes.io/limit-rpm: "6000"
        # nginx.ingress.kubernetes.io/limit-connections: "100"
        # nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
        # Some ingress controllers require an explicit gRPC service annotation.
        # nginx.org/grpc-services: "dir-dir-dev-argoapp-envoy-authz-envoy"
      tls:
        enabled: true
        secretName: ""

  # PostgreSQL subchart configuration
  # Deploys PostgreSQL alongside the apiserver
  # Credentials from auth.* (inline for Kind; use existingSecret + ExternalSecret for production)
  postgresql:
    enabled: true
    image:
      tag: "latest@sha256:621359194c6a0f0fd502c1996f40f539c3e5f2da43401b6d52ee5614722b7cba"
    auth:
      username: "dir"
      password: "dir"
      database: "dir"

  # Deployment strategy
  # Use Recreate to prevent lock conflicts during updates
  # BadgerDB (routing) uses exclusive file locks; RollingUpdate would cause pod crash
  strategy:
    type: Recreate

  # Pod security context - allows non-root user (65532) to write to volumes
  # Enhanced security following Pod Security Standards
  podSecurityContext:
    fsGroup: 65532            # Match the user ID from Dockerfile (distroless nonroot)
    runAsNonRoot: true        # Enforce non-root execution
    runAsUser: 65532          # Explicit user ID
    seccompProfile:           # Apply seccomp for syscall filtering
      type: RuntimeDefault

  # Container security context - restrictive permissions
  securityContext:
    allowPrivilegeEscalation: false  # Prevent privilege escalation
    runAsNonRoot: true               # Enforce non-root at container level
    runAsUser: 65532                 # Explicit UID (matches Dockerfile)
    capabilities:
      drop:
        - ALL                        # Drop all capabilities (principle of least privilege)

  # Extra volume mounts for the apiserver container
  extraVolumeMounts: 
  - name: zot-config-storage
    mountPath: /etc/zot
  - name: dir-routing-storage
    mountPath: /etc/routing

  # Extra volumes
  extraVolumes: 
  # Zot config storage volume for config hot-reloading
  - name: zot-config-storage
    hostPath:
      path: /opt/zot-config
      type: DirectoryOrCreate
  # Routing storage volume for peer-to-peer data
  - name: dir-routing-storage
    emptyDir: {}

  # Zot registry configuration (subchart)
  zot:
    # Resources: use chart default for Kind (allows flexible scheduling)
    resources: {}

    extraVolumeMounts: []
    extraVolumes: []
    
    # ZOT secrets (inline htpasswd for Kind)
    mountSecret: true
    authHeader: "admin:admin"
    secretFiles:
      # Example htpasswd with 'admin:admin' & 'user:user' user:pass pairs
      htpasswd: |-
        admin:$2y$05$vmiurPmJvHylk78HHFWuruFFVePlit9rZWGA/FbZfTEmNRneGJtha
        user:$2y$05$L86zqQDfH5y445dcMlwu6uHv.oXFgT6AiJCwpv3ehr7idc0rI3S2G
  
    # Zot config (static ConfigMap for Kind)
    mountConfig: true
    configFiles:
      config.json: |-
        {
          "distSpecVersion": "1.1.1",
          "storage": {
            "rootDirectory": "/var/lib/registry"
          },
          "http": {
            "address": "0.0.0.0",
            "port": "5000",
            "auth": {
              "htpasswd": {
                "path": "/secret/htpasswd"
              }
            },
            "accessControl": {
              "adminPolicy": {
                  "users": ["admin"],
                  "actions": ["read", "create", "update", "delete"]
              },
              "repositories": {
                "**": {
                  "anonymousPolicy": [],
                  "defaultPolicy": ["read"]
                }
              }
            }
          },
          "log": {
            "level": "info"
          },
          "extensions": {
            "search": {
              "enable": true
            },
            "trust": {
              "enable": true,
              "cosign": true,
              "notation": false
            }
          }
        }
