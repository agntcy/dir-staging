apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: "dir-dev-appset"
spec:
  syncPolicy:
    preserveResourcesOnDeletion: false
  generators:
    - merge:
        mergeKeys:
          - appName
        generators:
          - list:
              elements:
                - appName: spire-crds
                  namespace: dir-dev-spire-crds
                  syncWave: "0"
                - appName: dex-credentials
                  namespace: dir-dev-dex
                  syncWave: "0"
                - appName: spire
                  namespace: dir-dev-spire
                  syncWave: "1"
                - appName: dex
                  namespace: dir-dev-dex
                  syncWave: "1"
                - appName: dir
                  namespace: dir-dev-dir
                  syncWave: "2"
          # Get cluster config to set the cluster address
          - matrix:
              generators:
                - list:
                    elements:
                      - appName: spire-crds
                      - appName: dex-credentials
                      - appName: spire
                      - appName: dex
                      - appName: dir
                - git:
                    repoURL: "https://github.com/agntcy/dir-staging"
                    revision: main
                    files:
                      - path: "clusters/dir/dev/cluster-config.json"
          # Get app config to set chart details
          - matrix:
              generators:
                - list:
                    elements:
                      - appName: spire-crds
                      - appName: dex-credentials
                      - appName: spire
                      - appName: dex
                      - appName: dir
                - git:
                    repoURL: "https://github.com/agntcy/dir-staging"
                    revision: main
                    files:
                      - path: "applications/{{ appName }}/dev/config.json"
  template:
    metadata:
      name: "{{ appName }}-dir-dev-argoapp"
      labels:
        app: "{{ appName }}"
        env: "dev"
      annotations:
        argocd.argoproj.io/sync-wave: "{{ syncWave }}"
    spec:
      project: "dir-dev"
      sources:
        - repoURL: "{{ chart_repo }}"
          chart: "{{ chart_name }}"
          targetRevision: "{{ chart_version }}"
          helm:
            ignoreMissingValueFiles: true
            valueFiles:
              # Default values file
              - "$values/applications/{{ appName }}/dev/values.yaml"
              # Generated values file, usually created by scripts
              - "$values/applications/{{ appName }}/dev/gen.values.yaml"
        - repoURL: "https://github.com/agntcy/dir-staging"
          targetRevision: main
          ref: values
      destination:
        server: "{{ cluster_address }}"
        namespace: "{{ namespace }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
          - SkipDryRunOnMissingResource=true
          - RespectIgnoreDifferences=true
